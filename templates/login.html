<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SwimProgression</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #003366, #0055a4);
            padding: 1rem;
        }
        .login-card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 {
            color: #003366;
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
            text-align: center;
        }
        .login-card .tag {
            color: #64748b;
            text-align: center;
            margin-bottom: 1.75rem;
            font-size: 0.9rem;
        }
        .login-form .form-row {
            margin-bottom: 1rem;
            flex-direction: column;
            align-items: stretch;
            gap: 0.35rem;
        }
        .login-form label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
            min-width: auto;
        }
        .login-form input {
            padding: 0.7rem 0.9rem;
            font-size: 1rem;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            width: 100%;
        }
        .login-form input:focus {
            outline: none;
            border-color: #0055a4;
            box-shadow: 0 0 0 2px rgba(0,85,164,0.2);
        }
        .login-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.6rem 0.85rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .login-footer {
            margin-top: 1.25rem;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SwimProgression</h1>
        <p class="tag">Sign in to continue</p>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="post" class="login-form">
            <div class="form-row">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-row">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <div class="login-footer">CT Swimming Standards &amp; Swimmer Lookup</div>
    </div>
</body>
</html>
